<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Portal FDS</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f2a44">

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
    }

    header {
      background: #0f4c75;
      color: white;
      padding: 15px;
      text-align: center;
    }

    main {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    h2 {
      color: #0f4c75;
      text-align: center;
    }

    .subtitulo {
      text-align: center;
      color: #555;
      margin-bottom: 25px;
    }

    /* DASHBOARD */
    .grid-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 25px 15px;
      text-align: center;
      box-shadow: 0 6px 12px rgba(0,0,0,0.1);
      border: none;
      cursor: pointer;
    }

    .card:hover {
      background: #e6f0fa;
    }

    .icon {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .text {
      font-weight: bold;
      color: #0f4c75;
    }

    /* LISTADO */
    .box {
      background: white;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .product {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }

    .qr {
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<header>
  <h1>📄 Portal FDS</h1>
  <p>Consulta de Hojas de Seguridad – Uso en obra</p>
</header>

<main>

  <h2>📘 Consulta Pública FDS</h2>
  <p class="subtitulo">
    Acceso libre para todos los trabajadores<br>
    Información de seguridad – No editable
  </p>

  <!-- DASHBOARD -->
  <div class="grid-cards">

    <button class="card" onclick="document.getElementById('fds').scrollIntoView()">
      <div class="icon">📄</div>
      <div class="text">FDS / Sustancias</div>
    </button>

    <button class="card" onclick="document.getElementById('buscador').focus()">
      <div class="icon">🔍</div>
      <div class="text">Buscador</div>
    </button>

    <button class="card" onclick="alert('Riesgos / GHS (siguiente paso)')">
      <div class="icon">🧪</div>
      <div class="text">Riesgos / GHS</div>
    </button>

    <button class="card" onclick="alert('EPP Obligatorio (siguiente paso)')">
      <div class="icon">🦺</div>
      <div class="text">EPP Obligatorio</div>
    </button>

    <button class="card" onclick="cargar()">
      <div class="icon">🔄</div>
      <div class="text">Sincronizar</div>
    </button>

    <button class="card" onclick="alert('Información SSOMA')">
      <div class="icon">ℹ️</div>
      <div class="text">Info SSOMA</div>
    </button>

  </div>

  <!-- LISTADO FDS -->
  <section id="fds" class="box">
    <h3>📦 Sustancias químicas registradas</h3>

    <input
      type="text"
      id="buscador"
      placeholder="🔍 Buscar por nombre o proveedor..."
      oninput="filtrar()"
    />

    <div id="lista"></div>
  </section>

</main>

<script>
  const lista = document.getElementById("lista");
  const buscador = document.getElementById("buscador");
  let productos = [];

  async function cargar() {
    lista.innerHTML = "";
    const res = await fetch("/api/products");
    productos = await res.json();
    mostrar(productos);
  }

  function mostrar(data) {
    lista.innerHTML = "";

    data.forEach(p => {
      const div = document.createElement("div");
      div.className = "product";

      div.innerHTML = `
        <strong>${p.nombre}</strong><br>
        Proveedor: ${p.proveedor}<br>
        <a href="${pss="qr">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(p.url)}"div>
      `;

      lista.appendChild(div);
    });
  }

  function filtrar() {
    const texto = buscador.value.toLowerCase();

    const filtrados = productos.filter(p =>
      p.nombre.toLowerCase().includes(texto) ||
      p.proveedor.toLowerCase().includes(texto)
    );

    mostrar(filtrados);
  }

  cargar();
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/service-worker.js");
  }
</script>

</body>
</html>
