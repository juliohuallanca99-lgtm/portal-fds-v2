<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Portal FDS</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f2a44">

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 0;
    }

    header {
      background: #0f4c75;
      color: white;
      padding: 15px;
      text-align: center;
    }

    main {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    h2 {
      color: #0f4c75;
      text-align: center;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background: #0f4c75;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1b6ca8;
    }

    .product {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
    }

    .qr {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>📄 Portal FDS</h1>
  <p>Almacén y Logística – Consulta de Hojas de Seguridad</p>
</header>

<main>

  <h2>📘 Consulta pública de Sustancias Químicas</h2>
  <p style="text-align:center;color:#555">
    Acceso informativo para todos los trabajadores<br>
    Uso público – No editable
  </p>

  <div class="box">
    <h3>📦 Productos registrados</h3>
    <div id="lista"></div>
  </div>

</main>

<script>
  const lista = document.getElementById("lista");

  async function cargar() {
    lista.innerHTML = "";
    const res = await fetch("/api/products");
    const data = await res.json();

    data.forEach(p => {
      const div = document.createElement("div");
      div.className = "product";

      div.innerHTML = `
        <strong>${p.nombre}</strong><br>
        Proveedor: ${p.proveedor}<br>
        <a  <div class="qr">
          <img src="https://api.qrserver.com/v1/create-qre=150x150&data=${encodeURIComponent(p.url)}
        </div>
      `;

      lista.appendChild(div);
    });
  }

  cargar();
</script>

<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/service-worker.js");
  }
</script>

</body>
</html>
